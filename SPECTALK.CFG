; SpecTalk ZX Configuration File
; Place in SYS/CONFIG/SPECTALK.CFG

; === CONFIGURATION (all settings at top) ===
nick=SpecUser
server=irc.libera.chat
port=6667
;pass=
;nickpass=
autoconnect=1
theme=1
autoaway=0
beep=1
traffic=1
timestamps=1
tz=1
;friends=
;ignores=

; ============================================
; SETTINGS REFERENCE
; ============================================
;
; nick: Your IRC nickname
;   Max 17 characters. No spaces allowed.
;
; server: IRC server to connect to
;   Examples: irc.libera.chat, irc.efnet.org
;
; port: Server port (default 6667)
;
; pass: Server password (rarely needed)
;   Only for private servers that require
;   a password to connect. Most servers
;   don't need this. For NickServ, use /id.
;
; nickpass: NickServ password for auto-identify
;   If set, sends IDENTIFY to NickServ
;   automatically after connecting.
;
; autoconnect: Connect automatically on startup
;   0 = disabled (default)
;   1 = connects to server when program starts
;
; theme: Color scheme (1-3)
;   1 = Default (blue), 2 = Terminal (green)
;   3 = Commander (dark blue)
;
; autoaway: Auto-away after N minutes idle
;   0 = disabled, 1-60 = minutes
;
; beep: Sound on mention (0=off, 1=on)
;
; traffic: Show join/part/quit messages
;   0 = off, 1 = on
;
; timestamps: Show time prefix on messages
;   0 = off, 1 = always on
;   2 = smart (shows on minute change)
;
; tz: Timezone offset from UTC (-12 to +12)
;
; friends: Comma-separated list of friend nicks
;   Up to 5 nicks. Online status is polled
;   automatically. Example: friends=Nick1,Nick2
;
; ignores: Comma-separated list of ignored nicks
;   Up to 5 nicks. Messages from ignored users
;   are hidden. Example: ignores=Troll1,Troll2
